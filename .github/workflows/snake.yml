name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: toRolex
          outputs: |
            out/github-contribution-grid-snake.svg
            out/github-contribution-grid-snake-dark.svg
      - name: Replace colors with Catppuccin Mocha
        run: |
          sudo chown -R $(whoami) out/
          sed -i \
            -e 's/--c0:#ebedf0/--c0:#313244/' \
            -e 's/--c1:#9be9a8/--c1:#45475a/' \
            -e 's/--c2:#40c463/--c2:#6c7086/' \
            -e 's/--c3:#30a14e/--c3:#89b4fa/' \
            -e 's/--c4:#216e39/--c4:#cba6f7/' \
            -e 's/--ce:#ebedf0/--ce:#1e1e2e/' \
            -e 's/--cb:#ebedf00a/--cb:#3132440a/' \
            -e 's/purple/#cba6f7/' \
            out/github-contribution-grid-snake-dark.svg
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: out
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
